name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast PR gate. No network, no live server. <30s.
  # Compiles main + runs the pure-logic unit suite + smoke-publishes to
  # mavenLocal so we know pix's resolution path still works.
  lib-unit:
    name: Lib (unit tests + publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Unit tests
        run: ./gradlew :lib:test --no-daemon

      # Coverage report from the unit suite only. Uploaded as an artifact
      # so reviewers can eyeball the HTML report on any PR without needing
      # to run gradle locally. To add a Codecov/Coveralls upload step,
      # plug in here — the XML report is at lib/build/reports/kover/xml.
      - name: Coverage report (unit)
        run: ./gradlew :lib:koverHtmlReport :lib:koverXmlReport --no-daemon

      - name: Publish lib to local Maven (smoke)
        run: ./gradlew :lib:publishToMavenLocal --no-daemon

      - name: Upload unit-test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lib-unit-test-report
          path: lib/build/reports/tests/test/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lib-coverage-report
          path: |
            lib/build/reports/kover/html/
            lib/build/reports/kover/report.xml
          retention-days: 14

  # Server-dependent scenario suite (256 tests, ~5 min) against the live
  # Obscura server. Runs on main pushes only — PR feedback stays fast.
  # The tests use JUnit Assumptions.assumeTrue(checkServer()) so a server
  # outage shows as "skipped" rather than red. Worth eyeballing the report
  # after each main run until we move to a containerized test server.
  lib-integration:
    name: Lib (integration tests, live server)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      - name: Integration tests
        run: ./gradlew :lib:integrationTest --no-daemon

      - name: Upload integration-test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lib-integration-test-report
          path: lib/build/reports/tests/integrationTest/
          retention-days: 14
