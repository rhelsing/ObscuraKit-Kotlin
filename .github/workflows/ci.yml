name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lib:
    name: Lib (test + publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      # Pure JVM module — JUnit 5 scenario suite (CRDT, DeviceRevocation,
      # SessionReconnect, RecoveryMessaging, etc.). This is the gate that
      # would have caught the deviceId=""  bug at the source instead of
      # downstream in pix.
      - name: Test lib
        run: ./gradlew :lib:test --no-daemon

      # Smoke-publish to mavenLocal so we know pix's resolution path
      # (mavenLocal -> com.obscura:obscura-kit:0.1.0) still works after
      # build-script changes.
      - name: Publish lib to local Maven (smoke)
        run: ./gradlew :lib:publishToMavenLocal --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lib-test-report
          path: lib/build/reports/tests/test/
          retention-days: 7

  app:
    name: App (Android assemble)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v6

      # The demo/dev app inside this repo. Building it catches Compose /
      # AGP / Kotlin compiler regressions that the :lib JVM tests can't
      # see (different target, different toolchain). Debug only — release
      # would need a signing keystore.
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
